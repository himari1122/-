<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ハムスター家系図">
<meta name="theme-color" content="#7a5340">
<title>もふもふ家系図 | ハムスター飼育記録</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Kiwi+Maru:wght@400;500&display=swap');

  :root{
    --caramel:#b8794f;
    --caramel-dark:#7a5340;
    --cream:#fbf3e7;
    --card:#fffdf9;
    --pink:#e88ea0;
    --mint:#7fb8ab;
    --ink:#4a3628;
    --line:#e7d9c5;
  }
  *{box-sizing:border-box;}
  html{ overflow-x:hidden; width:100%; }
  body{
    margin:0;
    font-family:'Kiwi Maru', serif;
    background:var(--cream);
    color:var(--ink);
    padding-bottom:60px;
    overflow-x:hidden;
    width:100%;
  }
  header{
    position:sticky; top:0; z-index:10;
    background:var(--caramel-dark);
    color:#fff8ee;
    padding:22px 20px 18px;
    box-shadow:0 4px 16px rgba(74,54,40,0.18);
  }
  header h1{
    margin:0 0 4px;
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:900;
    font-size:1.5rem;
    letter-spacing:.02em;
  }
  header p{
    margin:0;
    font-size:.8rem;
    opacity:.85;
  }
  .toolbar{
    display:flex; gap:8px; margin-top:14px; min-width:0;
  }
  .toolbar input{
    flex:1; min-width:0;
    padding:10px 16px;
    border-radius:20px;
    border:none;
    font-family:inherit;
    font-size:.95rem;
    background:#fff8ee;
    color:var(--ink);
  }
  .toolbar input:focus{outline:2px solid var(--pink);}
  .toolbar select{
    min-width:0; max-width:100%;
    padding:0 12px;
    border-radius:20px;
    border:none;
    background:#fff8ee;
    color:var(--ink);
    font-family:inherit;
    font-size:.85rem;
  }
  main{max-width:1000px; margin:0 auto; padding:20px 16px;}
  .gen-block{margin-bottom:30px;}
  .gen-title{
    display:flex; align-items:baseline; gap:10px;
    margin:0 0 14px;
    padding-bottom:6px;
    border-bottom:2px dashed var(--line);
  }
  .gen-title .year{
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:900;
    font-size:1.3rem;
    color:var(--caramel-dark);
  }
  .gen-title .count{
    font-size:.75rem;
    color:var(--caramel);
    background:#f1e2cd;
    padding:2px 10px;
    border-radius:12px;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:8px;
  }
  .card{
    background:var(--card);
    border-radius:12px;
    padding:8px 4px 10px;
    text-align:center;
    cursor:pointer;
    border:2px solid var(--line);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .card:active{transform:scale(.96);}
  .card.female{border-color:var(--pink);}
  .card.male{border-color:var(--mint);}
  .emoji{font-size:1.7rem; line-height:1;}
  .photo{
    width:44px; height:44px; border-radius:50%;
    object-fit:cover; border:2px solid var(--line);
  }
  .sheet-photo{
    display:block; width:100px; height:100px; border-radius:50%;
    object-fit:cover; margin:0 auto 12px; border:3px solid var(--line);
  }
  .name{font-weight:700; font-size:.78rem; margin:5px 0 1px; font-family:'Zen Maru Gothic',sans-serif; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .sub{font-size:.6rem; color:#8a7360; line-height:1.3;}
  .badge{
    display:inline-block; font-size:.54rem; margin-top:3px;
    padding:1px 5px; border-radius:8px;
  }
  .badge.female{background:#fbe4ea; color:#c1466a;}
  .badge.male{background:#e1f1ec; color:#3f8a74;}
  .empty{text-align:center; color:#a88f77; padding:60px 20px; font-size:.95rem;}

  .modal{
    display:none; position:fixed; inset:0; background:rgba(74,54,40,.55);
    align-items:flex-end; justify-content:center; z-index:100;
  }
  .modal.open{display:flex;}
  .sheet{
    background:var(--card); width:100%; max-width:480px;
    border-radius:24px 24px 0 0; padding:28px 24px 34px;
    animation:up .25s ease;
  }
  @keyframes up{from{transform:translateY(30px); opacity:0;} to{transform:translateY(0); opacity:1;}}
  .sheet h2{
    margin:0 0 12px; font-family:'Zen Maru Gothic',sans-serif;
    font-size:1.4rem; display:flex; align-items:center; gap:8px;
  }
  .row{
    display:flex; justify-content:space-between;
    padding:9px 0; border-bottom:1px solid var(--line); font-size:.9rem;
  }
  .row span:first-child{color:#8a7360;}
  .row span:last-child{font-weight:700; cursor:pointer; color:var(--caramel-dark);}
  .close-btn{
    width:100%; margin-top:20px; padding:12px; border:none; border-radius:14px;
    background:var(--caramel-dark); color:#fff8ee; font-family:inherit;
    font-size:1rem; cursor:pointer;
  }
  footer{
    text-align:center; font-size:.7rem; color:#a88f77; padding:24px 20px 10px;
  }
</style>
</head>
<body>

<header>
  <h1>🐹 もふもふ家系図</h1>
  <p>飼育・繁殖の記録 — 名前や毛色で検索できます</p>
  <div class="toolbar">
    <input id="search" placeholder="名前・毛色で検索..." oninput="render()">
    <select id="genderFilter" onchange="render()">
      <option value="">全員</option>
      <option value="女子">女子</option>
      <option value="男子">男子</option>
    </select>
  </div>
  <div class="toolbar" style="margin-top:8px;">
    <select id="viewMode" onchange="render()" style="flex:1;">
      <option value="all">すべて</option>
      <option value="year">生まれ年別</option>
      <option value="adopted">お迎え組</option>
      <option value="blood">血縁組</option>
    </select>
  </div>
  <div class="toolbar" style="margin-top:8px;">
    <select id="baseFilter" onchange="render()" style="flex:1;">
      <option value="">ベース：全部</option>
      <option value="ノーマル">ノーマル</option>
      <option value="サファイア">サファイア</option>
      <option value="モカ">モカ</option>
      <option value="ムーン">ムーン</option>
    </select>
    <select id="extraFilter" onchange="render()" style="flex:1;">
      <option value="">付加色：全部</option>
      <option value="白">白</option>
      <option value="黄">黄</option>
      <option value="白黄">白黄</option>
      <option value="黒">黒</option>
      <option value="ベース">ベース</option>
    </select>
  </div>
</header>

<main id="main"></main>

<footer>@Himari_hamuhamu</footer>

<div class="modal" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="sheet" id="sheet"></div>
</div>

function matches(h, term, gender, base, extra){
  const t = term.toLowerCase();
  const nameHit = h.name.toLowerCase().includes(t) || (h.color && h.color.toLowerCase().includes(t));
  const genderHit = !gender || h.gender === gender;
  const baseHit = !base || h.base === base;
  const extraHit = !extra || h.extra === extra;
  return nameHit && genderHit && baseHit && extraHit;
}

function formatBirthdateShort(h){
  if(!h.birthdate) return `${h.birth}`;
  const [month, day] = h.birthdate.split('.');
  return `${h.birth}.${month}.${day}`;
}

function card(h){
  const cls = h.gender.includes('女') ? 'female' : 'male';
  const face = h.photo
    ? `<img class="photo" src="${h.photo}" alt="${h.name}">`
    : `<div class="emoji">🐹</div>`;
  return `<div class="card ${cls}" onclick="openDetail('${h.name}')">
    ${face}
    <div class="name">${h.name}</div>
    <div class="sub">${h.color}</div>
    <span class="badge ${cls}">${formatBirthdate(h)}</span>
  </div>`;
}

function render(){

  const gender = document.getElementById('genderFilter').value;
  const base = document.getElementById('baseFilter').value;
  const extra = document.getElementById('extraFilter').value;
  const viewMode = document.getElementById('viewMode').value;

  let filtered = familyData.filter(h => matches(h, term, gender, base, extra));

  if(viewMode === 'adopted'){
    filtered = filtered.filter(h => !h.father && !h.mother);
  } else if(viewMode === 'blood'){
    filtered = filtered.filter(h => h.father && h.mother);
  }

  if(filtered.length === 0){
    document.getElementById('main').innerHTML = `<div class="empty">🐹 該当するハムスターが見つかりませんでした</div>`;
    return;
  }

  if(viewMode === 'all' || viewMode === 'adopted' || viewMode === 'blood'){
    const label = viewMode === 'adopted' ? 'お迎え組'
      : viewMode === 'blood' ? '血縁組'
      : 'すべて';
    document.getElementById('main').innerHTML = `
      <div class="gen-block">
        <div class="gen-title">
          <span class="year">${label}</span>
          <span class="count">${filtered.length}匹</span>
        </div>
        <div class="grid">${filtered.map(card).join('')}</div>
      </div>
    `;
    return;
  }

  const byYear = {};
  filtered.forEach(h => {
    (byYear[h.birth] = byYear[h.birth] || []).push(h);
  });

  const years = Object.keys(byYear).sort();
  document.getElementById('main').innerHTML = years.map(y => `
    <div class="gen-block">
      <div class="gen-title">
        <span class="year">${y}年生まれ</span>
        <span class="count">${byYear[y].length}匹</span>
      </div>
      <div class="grid">${byYear[y].map(card).join('')}</div>
    </div>
  `).join('');
}

function formatBirthdate(h){
  if(!h.birthdate) return `${h.birth}年`;
  const [month, day] = h.birthdate.split('.');
  return `${h.birth}年${month}月${day}日`;
}

function openDetail(name){
  const h = familyData.find(x => x.name === name);
  if(!h) return;
  const cls = h.gender.includes('女') ? 'female' : 'male';
  let rows = `
    <div class="row"><span>毛色</span><span style="cursor:default;">${h.color}</span></div>`;
  if(h.base) rows += `<div class="row"><span>ベース</span><span style="cursor:default;">${h.base}</span></div>`;
  if(h.extra) rows += `<div class="row"><span>付加色</span><span style="cursor:default;">${h.extra}</span></div>`;
  rows += `
    <div class="row"><span>生年月日</span><span style="cursor:default;">${formatBirthdate(h)}</span></div>
    <div class="row"><span>性別</span><span style="cursor:default;">${h.gender}</span></div>`;
  if(h.father) rows += `<div class="row"><span>父</span><span onclick="openDetail('${h.father}')">${h.father} ›</span></div>`;
  if(h.mother) rows += `<div class="row"><span>母</span><span onclick="openDetail('${h.mother}')">${h.mother} ›</span></div>`;
  if(h.mate) rows += `<div class="row"><span>配偶者</span><span onclick="openDetail('${h.mate}')">${h.mate} ›</span></div>`;

  if(h.father || h.mother){
    const siblings = familyData.filter(x =>
      x.name !== h.name && x.father && x.mother && x.father === h.father && x.mother === h.mother
    );
    if(siblings.length > 0){
      const chips = siblings.map(s => `<span onclick="openDetail('${s.name}')" style="cursor:pointer; background:#f1e2cd; color:var(--caramel-dark); font-weight:700; padding:3px 12px; border-radius:12px; font-size:.8rem; white-space:nowrap;">${s.name}</span>`).join('');
      rows += `<div class="row" style="flex-direction:column; align-items:flex-start; gap:8px; padding-bottom:12px;">
        <span>兄弟姉妹</span>
        <div style="display:flex; flex-wrap:wrap; gap:6px;">${chips}</div>
      </div>`;
    }
  }

  const sheetFace = h.photo
    ? `<img class="sheet-photo" src="${h.photo}" alt="${h.name}">`
    : '';
  document.getElementById('sheet').innerHTML = `
    ${sheetFace}
    <h2>🐹 ${h.name}</h2>
    ${rows}
    <button class="close-btn" onclick="closeModal()">閉じる</button>
  `;
  document.getElementById('modal').classList.add('open');
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
}

render();
</script>
</body>
</html>
